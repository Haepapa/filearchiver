name: Build binaries

on:
  push:
    branches: ["test", "prod"]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Download deps
        run: go mod download
      - name: Test
        run: go test ./...

  build:
    name: Build cross-platform binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/filearchiver-${{ matrix.goos }}-${{ matrix.goarch }}$EXT .
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/filearchiver-web-${{ matrix.goos }}-${{ matrix.goarch }}$EXT ./cmd/web/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: filearchiver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/filearchiver*-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  docker-web:
    name: Build & push filearchiver-web Docker image
    needs: test
    runs-on: ubuntu-latest
    # Only push images on prod branch; build-only on test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/prod'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/filearchiver-web
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/prod' }}
            type=sha,prefix=sha-

      - name: Build (and push on prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: ${{ github.ref == 'refs/heads/prod' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

