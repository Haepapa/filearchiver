version: '3.8'

services:
  # Setup service - run once to create directories and template files
  filearchiver-setup:
    image: ghcr.io/haepapa/filearchiver:latest
    container_name: filearchiver-setup
    # Run as the host user so the container can write to bind-mounted directories.
    # Set UID/GID in your .env file or export them before running docker compose.
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Persistent volume for config files, database, and lock file
      - filearchiver-config:/config
    command: ["-setup", "/config", "-input", "/data/input", "-output", "/data/output"]
    restart: "no"

  filearchiver:
    image: ghcr.io/haepapa/filearchiver:latest
    container_name: filearchiver
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Mount your source directory
      - /path/to/source:/data/input
      # Mount your destination/archive directory
      - /path/to/archive:/data/output
      # Persistent volume for config files (config.yaml, .archiveignore),
      # database (filearchiver.db), and lock file (.filearchiver.lock)
      - filearchiver-config:/config
    # Example: One-off archive job
    command: ["-input", "/data/input", "-output", "/data/output"]
    # Or for config-based mode (config.yaml lives in the /config volume):
    # command: ["-config", "/config/config.yaml"]
    # Or for init mode:
    # command: ["-init", "-output", "/data/output"]
    restart: "no"  # Change to "unless-stopped" for persistent archiving

volumes:
  filearchiver-config:
    driver: local

