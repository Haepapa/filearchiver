version: '3.8'

services:
  filearchiver:
    image: ghcr.io/haepapa/filearchiver:latest
    container_name: filearchiver
    volumes:
      # Mount your source directory (read-only recommended for archiving)
      - /path/to/source:/data/input:ro
      # Mount your destination/archive directory
      - /path/to/archive:/data/output
      # Mount config file if using config-based mode
      - /path/to/config.yaml:/data/config/config.yaml:ro
      # Persistent data for database and lock files
      - filearchiver-data:/data
    # Example: One-off archive job
    command: ["-input", "/data/input", "-output", "/data/output"]
    # Or for config-based mode:
    # command: ["-config", "/data/config/config.yaml"]
    # Or for init mode:
    # command: ["-init", "-output", "/data/output"]
    restart: "no"  # Change to "unless-stopped" for persistent archiving

volumes:
  filearchiver-data:
    driver: local

